<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    width: 220px;
    background: #0d1117;
    color: #e2e8f0;
    font-family: 'Courier New', monospace;
    padding: 20px 16px;
  }

  .logo {
    font-size: 13px;
    font-weight: bold;
    color: #ef4444;
    letter-spacing: 3px;
    margin-bottom: 16px;
    text-align: center;
  }

  .status-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 16px;
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot.active { background: #22c55e; box-shadow: 0 0 6px #22c55e; animation: pulse 2s infinite; }
  .dot.idle   { background: #4b5563; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  .status-text {
    font-size: 11px;
    letter-spacing: 2px;
  }
  .status-text.active { color: #22c55e; }
  .status-text.idle   { color: #4b5563; }

  .divider {
    border: none;
    border-top: 1px solid #1e2530;
    margin: 12px 0;
  }

  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .info-label {
    font-size: 9px;
    letter-spacing: 1px;
    color: #4b5563;
    text-transform: uppercase;
  }

  .info-value {
    font-size: 11px;
    color: #94a3b8;
    text-align: right;
  }

  .timer {
    text-align: center;
    margin-top: 14px;
    padding: 10px;
    background: #161b22;
    border: 1px solid #1e2530;
    border-radius: 4px;
  }

  .timer-label {
    font-size: 9px;
    letter-spacing: 1px;
    color: #4b5563;
    margin-bottom: 4px;
  }

  .timer-value {
    font-size: 22px;
    font-weight: bold;
    color: #f59e0b;
    letter-spacing: 3px;
  }

  .timer-value.low { color: #ef4444; }

  .idle-msg {
    text-align: center;
    color: #4b5563;
    font-size: 10px;
    letter-spacing: 1px;
    margin-top: 8px;
  }

  .login-form { display:none; margin-top:12px; }
  .login-form input {
    width:100%; margin-bottom:8px; padding:7px;
    background:#161b22; color:#e2e8f0; border:1px solid #30363d;
    border-radius:3px; font-family:'Courier New', monospace;
  }
  .login-form button {
    width:100%; padding:8px; border:0; border-radius:3px;
    background:#ef4444; color:white; font-weight:bold; cursor:pointer;
  }
  .login-error { color:#ef4444; font-size:9px; margin-top:7px; text-align:center; }
  .sync-msg { text-align:center; font-size:9px; margin-top:10px; }
  .sync-msg.ok { color:#22c55e; }
  .sync-msg.error { color:#ef4444; }
</style>
</head>
<body>
<div class="logo">EXAMGUARD</div>

<div class="status-row">
  <div class="dot idle" id="dot"></div>
  <span class="status-text idle" id="statusText">BEKLİYOR</span>
</div>

<div id="examInfo" style="display:none">
  <hr class="divider">
  <div class="info-row">
    <span class="info-label">MOD</span>
    <span class="info-value" id="infoMode">—</span>
  </div>
  <div class="timer">
    <div class="timer-label">KALAN SÜRE</div>
    <div class="timer-value" id="timerVal">--:--</div>
  </div>
</div>

<div class="idle-msg" id="idleMsg">Sınav bekleniyor...</div>
<div class="sync-msg" id="syncMsg">Backend kontrol ediliyor...</div>
<div class="login-form" id="loginForm">
  <input id="studentName" placeholder="Ad Soyad">
  <input id="studentId" placeholder="Öğrenci Numarası">
  <input id="examCode" type="password" placeholder="Sınav Kodu">
  <button id="loginButton">GİRİŞ YAP</button>
  <div class="login-error" id="loginError"></div>
</div>

<script src="popup.js"></script>
</body>
</html>
